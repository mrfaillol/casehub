<!--
  Pill Toggle — CaseHub Design System
  Extraído de: codepen-references/pill-toggle/ (Tier A, copy-paste direto)
  Técnica: CSS :has() + radio inputs — zero JS
  Custo: 60fps, <30ms transition, zero GPU layers extras
  Security scan: 2026-04-13 SAFE (CSS/HTML puros, sem JS)
-->

<div class="snippet-group" data-category="forms">

  <h3>Pill Toggle</h3>
  <p class="snippet-caption">Toggle binário CSS-only com <code>:has()</code>. Uso: settings, filtros sim/não, preferências.</p>

  <style>
    .ch-pill-toggle {
      border: none;
      padding: 0;
      margin: 0;
      display: inline-block;
    }
    .ch-pill-toggle__legend {
      display: block;
      margin-bottom: .5rem;
      font-size: .875rem;
      color: var(--text-secondary, rgba(255,255,255,.7));
    }
    .ch-pill-toggle__fieldset {
      border: none;
      padding: 0;
      margin: 0;
    }
    .ch-pill-toggle__box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--glass-white-sm, rgba(255,255,255,.06));
      border: 1px solid var(--glass-border, rgba(255,255,255,.12));
      border-radius: 999px;
      position: relative;
      isolation: isolate;
      padding-inline: .25rem;
    }
    .ch-pill-toggle__box::before {
      content: "";
      position: absolute;
      inset: 0;
      width: calc(50% + .25rem);
      margin-block: -2px;
      border-radius: 999px;
      background: var(--accent-aqua, #55d7ff);
      z-index: -1;
      transition: transform .2s cubic-bezier(.66,-.33,.33,1.33);
    }
    .ch-pill-toggle__box:has([data-pill-off]:checked)::before {
      transform: translateX(calc(100% - .5rem));
    }
    .ch-pill-toggle__radio {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .375rem;
      padding: .5rem 1rem;
      position: relative;
      font-size: .875rem;
      font-weight: 500;
      color: var(--text-primary, #fff);
      cursor: pointer;
      min-height: 44px; /* mobile tap target */
    }
    .ch-pill-toggle__input {
      position: absolute;
      inset: 0;
      appearance: none;
      margin: 0;
      border-radius: 999px;
      cursor: pointer;
      outline-offset: 4px;
      outline-color: var(--accent-aqua, #55d7ff);
    }
    .ch-pill-toggle__input:focus-visible {
      outline: 2px solid var(--accent-aqua, #55d7ff);
    }
  </style>

  <fieldset class="ch-pill-toggle">
    <legend class="ch-pill-toggle__legend">Notificações por e-mail</legend>
    <fieldset class="ch-pill-toggle__fieldset">
      <div class="ch-pill-toggle__box">
        <label class="ch-pill-toggle__radio">
          <input type="radio" name="notif" value="on" checked class="ch-pill-toggle__input" data-pill-on>
          <span>Sim</span>
        </label>
        <label class="ch-pill-toggle__radio">
          <input type="radio" name="notif" value="off" class="ch-pill-toggle__input" data-pill-off>
          <span>Não</span>
        </label>
      </div>
    </fieldset>
  </fieldset>

</div>
