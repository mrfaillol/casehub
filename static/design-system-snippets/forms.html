<div class="snippet-group" data-category="forms">

  <!-- Glass Inputs -->
  <h3>Glass Inputs</h3>
  <div style="display:flex;flex-direction:column;gap:12px;max-width:360px;margin-bottom:24px;">
    <div class="glass-input-wrap">
      <input type="text" class="glass-input" placeholder="Default input">
    </div>
    <div class="glass-input-wrap">
      <input type="text" class="glass-input" placeholder="With icon" value="Hello world">
      <span class="glass-input-icon">&#128269;</span>
    </div>
    <div class="glass-input-wrap">
      <input type="text" class="glass-input" aria-invalid="true" placeholder="Invalid input" value="Bad value">
    </div>
    <div class="glass-input-wrap">
      <input type="text" class="glass-input" disabled placeholder="Disabled input" value="Cannot edit">
    </div>
    <textarea class="glass-textarea" placeholder="Glass textarea..."></textarea>
  </div>

  <!-- Glass Select -->
  <h3>Glass Select</h3>
  <div style="max-width:360px;margin-bottom:24px;">
    <select class="glass-select">
      <option value="">Select an option</option>
      <option value="1">Option Alpha</option>
      <option value="2">Option Beta</option>
      <option value="3">Option Gamma</option>
    </select>
  </div>

  <!-- Neuromorphic Inputs -->
  <h3>Neuromorphic Inputs</h3>
  <div style="display:flex;flex-direction:column;gap:12px;max-width:360px;margin-bottom:24px;">
    <input type="text" class="neu-input" placeholder="Default input">
    <input type="text" class="neu-input" value="Focused input (click me)">
    <input type="text" class="neu-input is-invalid" value="Invalid input">
    <input type="text" class="neu-input" disabled value="Disabled input">
  </div>

  <!-- Neuromorphic Select -->
  <h3>Neuromorphic Select</h3>
  <div style="max-width:360px;margin-bottom:24px;">
    <select class="neu-select">
      <option value="">Select an option</option>
      <option value="1">Option Alpha</option>
      <option value="2">Option Beta</option>
      <option value="3">Option Gamma</option>
    </select>
  </div>

  <!-- Glass Toggles / Switches -->
  <h3>Glass Switches</h3>
  <div style="display:flex;flex-wrap:wrap;gap:24px;margin-bottom:24px;">
    <label class="glass-switch-label">
      <input type="checkbox">
      <span class="glass-switch-track"><span class="glass-switch-thumb"></span></span>
      Off
    </label>
    <label class="glass-switch-label">
      <input type="checkbox" checked>
      <span class="glass-switch-track"><span class="glass-switch-thumb"></span></span>
      On
    </label>
  </div>

  <!-- Glass Checkboxes -->
  <h3>Glass Checkboxes</h3>
  <div class="glass-check-group" style="margin-bottom:24px;">
    <label class="glass-check-label">
      <input type="checkbox">
      <span class="glass-check-box"></span>
      Unchecked option
    </label>
    <label class="glass-check-label">
      <input type="checkbox" checked>
      <span class="glass-check-box"></span>
      Checked option
    </label>
    <label class="glass-check-label">
      <input type="checkbox" disabled>
      <span class="glass-check-box"></span>
      Disabled option
    </label>
  </div>

  <!-- Glass Radios -->
  <h3>Glass Radios</h3>
  <div class="glass-check-group" style="margin-bottom:24px;">
    <label class="glass-check-label">
      <input type="radio" name="demo-radio" checked>
      <span class="glass-radio-box"></span>
      Option A
    </label>
    <label class="glass-check-label">
      <input type="radio" name="demo-radio">
      <span class="glass-radio-box"></span>
      Option B
    </label>
    <label class="glass-check-label">
      <input type="radio" name="demo-radio" disabled>
      <span class="glass-radio-box"></span>
      Disabled
    </label>
  </div>

  <!-- File Upload Area -->
  <h3>File Upload</h3>
  <div style="max-width:360px;margin-bottom:24px;">
    <div class="glass-card" style="padding:32px;text-align:center;border:2px dashed var(--glass-border);cursor:pointer;">
      <div style="font-size:2rem;opacity:.4;margin-bottom:8px;">&#128206;</div>
      <p style="margin:0;font-size:var(--text-sm);opacity:.7">Drop files here or click to upload</p>
      <small style="opacity:.5">PNG, JPG, PDF up to 10MB</small>
    </div>
  </div>

</div>
