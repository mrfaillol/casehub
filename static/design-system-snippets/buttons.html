<div class="snippet-group" data-category="buttons">

  <!-- Glass Buttons -->
  <h3>Glass Buttons</h3>
  <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px;">
    <button class="glass-btn">Default</button>
    <button class="glass-btn glass-btn--primary">Primary</button>
    <button class="glass-btn glass-btn--accent">Accent</button>
    <button class="glass-btn glass-btn--danger">Danger</button>
    <button class="glass-btn glass-btn--ghost">Ghost</button>
  </div>

  <!-- Glass Sizes -->
  <h4>Sizes</h4>
  <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px;">
    <button class="glass-btn glass-btn--sm glass-btn--primary">Small</button>
    <button class="glass-btn glass-btn--primary">Medium</button>
    <button class="glass-btn glass-btn--lg glass-btn--primary">Large</button>
    <button class="glass-btn glass-btn--icon glass-btn--primary" title="Icon button">+</button>
  </div>

  <!-- Glass States -->
  <h4>States</h4>
  <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:24px;">
    <button class="glass-btn glass-btn--primary">Normal</button>
    <button class="glass-btn glass-btn--primary" disabled>Disabled</button>
  </div>

  <!-- Neuromorphic Buttons -->
  <h3>Neuromorphic Buttons</h3>
  <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px;">
    <button class="neu-btn">Default</button>
    <button class="neu-btn neu-btn--primary">Primary</button>
    <button class="neu-btn neu-btn--success">Success</button>
    <button class="neu-btn neu-btn--danger">Danger</button>
    <button class="neu-btn neu-btn--ghost">Ghost</button>
  </div>

  <!-- Neuromorphic Sizes -->
  <h4>Sizes</h4>
  <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px;">
    <button class="neu-btn neu-btn--sm neu-btn--primary">Small</button>
    <button class="neu-btn neu-btn--md neu-btn--primary">Medium</button>
    <button class="neu-btn neu-btn--lg neu-btn--primary">Large</button>
    <button class="neu-btn neu-btn--icon neu-btn--primary" title="Icon button">+</button>
  </div>

  <!-- Neuromorphic States -->
  <h4>States</h4>
  <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px;">
    <button class="neu-btn neu-btn--primary">Normal</button>
    <button class="neu-btn neu-btn--primary" disabled>Disabled</button>
    <button class="neu-btn neu-btn--primary is-loading">Loading</button>
  </div>

</div>
