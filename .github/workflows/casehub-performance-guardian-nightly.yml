name: casehub-performance-guardian-nightly

on:
  schedule:
    - cron: "27 7 * * 1,3,5"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: casehub-performance-guardian-nightly
  cancel-in-progress: false

jobs:
  oracle-dev-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Oracle dev benchmark when configured
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          CASEHUB_PERF_BASE_URL: https://dev.vingren.me
          CASEHUB_PERF_PROFILE: readme-min-current
          CASEHUB_PERF_ISSUE: "359"
        run: bash scripts/run-performance-guardian-nightly.sh
