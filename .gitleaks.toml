# .gitleaks.toml — CaseHub
# Estende as regras padrão do gitleaks e mantém um allowlist mínimo e explícito.
#
# Os arquivos abaixo são testes que usam valores de segredo FICTÍCIOS (dummy) —
# verificados como não-reais em 2026-06-02. Em especial, tests/test_maestro_repo_aware.py
# e tests/test_wa_crm_owner_funnel.py exercitam a FUNÇÃO DE REDAÇÃO de segredos, então
# precisam conter strings que *parecem* segredos para provar que são redigidas.
title = "CaseHub gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Fixtures de teste com segredos dummy (não-reais, verificado 2026-06-02)"
paths = [
  '''tests/test_ai_provider\.py''',
  '''tests/test_maestro_repo_aware\.py''',
  '''tests/test_wa_crm_owner_funnel\.py''',
]
