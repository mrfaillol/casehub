{# Universal email compose modal — included in base.html when Gmail available.
   Trigger: any element with data-ch-compose (optional: data-to, data-subject,
   data-body, data-client-id, data-case-id). #}
<dialog id="ch-compose-modal" aria-labelledby="ch-compose-modal-title" aria-modal="true">
  <div class="ch-compose-modal__header">
    <span class="ch-compose-modal__title" id="ch-compose-modal-title">
      <i data-lucide="mail" style="width:16px;height:16px;flex-shrink:0;" aria-hidden="true"></i>
      Novo E-mail
      <span class="ch-compose-modal__provider" id="ch-compose-provider-badge"></span>
    </span>
    <button class="ch-compose-modal__close"
            onclick="document.getElementById('ch-compose-modal').close()"
            aria-label="Fechar modal">
      <i data-lucide="x" style="width:16px;height:16px;" aria-hidden="true"></i>
    </button>
  </div>

  <form id="ch-compose-form" class="ch-compose-modal__body" novalidate>
    <input type="hidden" id="ch-compose-client-id" name="client_id">
    <input type="hidden" id="ch-compose-case-id"   name="case_id">

    <div class="ch-compose-modal__field">
      <label class="ch-compose-modal__label" for="ch-compose-to">Para</label>
      <input class="ch-compose-modal__input" type="email"
             id="ch-compose-to" name="to"
             placeholder="destinatario@exemplo.com" required autocomplete="email">
    </div>

    <div class="ch-compose-modal__field">
      <label class="ch-compose-modal__label" for="ch-compose-cc">Cc</label>
      <input class="ch-compose-modal__input" type="email"
             id="ch-compose-cc" name="cc"
             placeholder="(opcional)" autocomplete="off">
    </div>

    <div class="ch-compose-modal__field">
      <label class="ch-compose-modal__label" for="ch-compose-subject">Assunto</label>
      <input class="ch-compose-modal__input" type="text"
             id="ch-compose-subject" name="subject"
             placeholder="Assunto do e-mail" required>
    </div>

    <div class="ch-compose-modal__field">
      <label class="ch-compose-modal__label" for="ch-compose-body">Mensagem</label>
      <textarea class="ch-compose-modal__textarea"
                id="ch-compose-body" name="body"
                placeholder="Escreva sua mensagem..." required></textarea>
    </div>
  </form>

  <div class="ch-compose-modal__footer">
    <span class="ch-compose-modal__status" id="ch-compose-status" aria-live="polite"></span>
    <button type="button" class="ch-btn ch-btn--ghost ch-btn--sm"
            onclick="document.getElementById('ch-compose-modal').close()">
      Cancelar
    </button>
    <button type="button" class="ch-btn ch-btn--primary ch-btn--sm"
            id="ch-compose-send-btn"
            onclick="window.__chComposeSend()">
      <i data-lucide="send" style="width:14px;height:14px;" aria-hidden="true"></i>
      Enviar
    </button>
  </div>
</dialog>
