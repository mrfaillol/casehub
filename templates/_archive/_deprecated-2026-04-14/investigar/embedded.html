{% extends "base.html" %}
{% block title %}WhatsApp - {{ org_name|default('CaseHub') }}{% endblock %}

{% block extra_css %}
<style>
.wa-embedded-container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 80px);
    background: #111b21;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #2a3942;
}

.wa-embedded-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: #202c33;
    border-bottom: 1px solid #2a3942;
    min-height: 50px;
}

.wa-embedded-title {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #e9edef;
    font-size: 16px;
    font-weight: 500;
}

.wa-embedded-title i {
    color: #00a884;
    font-size: 24px;
}

.wa-embedded-actions {
    display: flex;
    gap: 8px;
}

.wa-embedded-btn {
    background: #2a3942;
    border: none;
    color: #8696a0;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
}

.wa-embedded-btn:hover {
    background: #3b4a54;
    color: #e9edef;
}

.wa-embedded-btn.primary {
    background: #00a884;
    color: white;
}

.wa-embedded-btn.primary:hover {
    background: #06cf9c;
}

.wa-embedded-iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: #111b21;
}

.wa-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #8696a0;
    font-size: 14px;
}

.wa-loading i {
    margin-right: 8px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* Status indicator */
.wa-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #8696a0;
}

.wa-status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #8696a0;
}

.wa-status-dot.connected {
    background: #00a884;
}

.wa-status-dot.disconnected {
    background: #f15c6d;
}
</style>
{% endblock %}

{% block content %}
<div class="wa-embedded-container">
    <div class="wa-embedded-header">
        <div class="wa-embedded-title">
            <i class="fab fa-whatsapp"></i>
            <span>WhatsApp Chat</span>
            <div class="wa-status">
                <span class="wa-status-dot" id="statusDot"></span>
                <span id="statusText">Conectando...</span>
            </div>
        </div>
        <div class="wa-embedded-actions">
            <button class="wa-embedded-btn" onclick="reloadIframe()" title="Recarregar">
                <i class="fas fa-sync-alt"></i>
            </button>
            <button class="wa-embedded-btn" onclick="openInNewTab()" title="Abrir em nova aba">
                <i class="fas fa-external-link-alt"></i>
            </button>
        </div>
    </div>

    <div id="loadingContainer" class="wa-loading">
        <i class="fas fa-spinner"></i>
        Carregando WhatsApp...
    </div>

    <iframe
        id="whatsappFrame"
        class="wa-embedded-iframe"
        src="{{ standalone_url }}"
        style="display: none;"
        onload="frameLoaded()"
        allow="clipboard-read; clipboard-write"
    ></iframe>
</div>
{% endblock %}

{% block extra_js %}
<script>
const STANDALONE_URL = "{{ standalone_url }}";

function frameLoaded() {
    document.getElementById('loadingContainer').style.display = 'none';
    document.getElementById('whatsappFrame').style.display = 'block';

    // Check status
    checkStatus();
}

function reloadIframe() {
    const frame = document.getElementById('whatsappFrame');
    document.getElementById('loadingContainer').style.display = 'flex';
    frame.style.display = 'none';
    frame.src = frame.src;
}

function openInNewTab() {
    window.open(STANDALONE_URL, '_blank');
}

async function checkStatus() {
    try {
        const response = await fetch('{{ PREFIX }}/whatsapp-chat/api/status');
        const data = await response.json();

        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusText');

        if (data.connected || data.isReady) {
            dot.className = 'wa-status-dot connected';
            text.textContent = 'Conectado';
        } else {
            dot.className = 'wa-status-dot disconnected';
            text.textContent = 'Desconectado';
        }
    } catch (e) {
        document.getElementById('statusDot').className = 'wa-status-dot disconnected';
        document.getElementById('statusText').textContent = 'Erro';
    }
}

// Check status every 30 seconds
setInterval(checkStatus, 30000);
</script>
{% endblock %}
