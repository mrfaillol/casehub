<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - {{ org_name|default('CaseHub') }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #333333;
            --secondary: #1a1a1a;
        }
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            border: 1px solid #333;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo i {
            font-size: 3rem;
            color: #ffffff;
        }
        .login-logo h1 {
            font-size: 1.8rem;
            color: #ffffff;
            margin-top: 0.5rem;
        }
        .login-logo p {
            color: #888 !important;
        }
        .form-label {
            color: #ccc;
        }
        .form-control {
            background: #2a2a2a;
            border-color: #444;
            color: #fff;
        }
        .form-control:focus {
            background: #2a2a2a;
            border-color: #666;
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(255,255,255,0.1);
        }
        .input-group-text {
            background: #333;
            border-color: #444;
            color: #888;
        }
        .btn-primary {
            background: #333;
            border-color: #444;
            color: #fff;
        }
        .btn-primary:hover {
            background: #444;
            border-color: #555;
            color: #fff;
        }
        .alert-danger {
            background: #3a1a1a;
            border-color: #5a2a2a;
            color: #ff8888;
        }
        .alert-success {
            background: #1a3a1a;
            border-color: #2a5a2a;
            color: #88ff88;
        }
        a {
            color: #aaa;
        }
        a:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-lock-open"></i>
            <h1>{{ org_name|default('CaseHub') }}</h1>
            <p class="text-muted">Set a new password</p>
        </div>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success">{{ success }}</div>
        <div class="text-center mt-3">
            <a href="{{ PREFIX }}/login" class="btn btn-primary glass-btn glass-btn--primary w-100 py-2">
                <i class="fas fa-sign-in-alt me-2"></i>Go to Login
            </a>
        </div>
        {% elif token %}
        <form method="post" action="{{ PREFIX }}/reset-password/{{ token }}">
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control glass-input" name="password" required minlength="8" autofocus>
                </div>
                <small style="color: var(--text-secondary);">Minimum 8 characters</small>
            </div>
            <div class="mb-4">
                <label class="form-label">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control glass-input" name="password_confirm" required minlength="8">
                </div>
            </div>
            <button type="submit" class="btn btn-primary glass-btn glass-btn--primary w-100 py-2">
                <i class="fas fa-check me-2"></i>Reset Password
            </button>
        </form>
        {% else %}
        <div class="text-center mt-3">
            <a href="{{ PREFIX }}/forgot-password" class="btn btn-primary glass-btn glass-btn--primary w-100 py-2">
                <i class="fas fa-redo me-2"></i>Request New Reset Link
            </a>
        </div>
        {% endif %}

        <div class="text-center mt-3">
            <a href="{{ PREFIX }}/login"><i class="fas fa-arrow-left me-1"></i>Back to Login</a>
        </div>
    </div>
</body>
</html>
