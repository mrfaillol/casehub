<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link inválido — CaseHub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/tokens.css?v=1">
    <link rel="stylesheet" href="/static/css/reset.css?v=1">
    <style>
        body { background:#0a0a0a; min-height:100vh; color:#e0e0e0;
               font-family:-apple-system, BlinkMacSystemFont, sans-serif;
               display:flex; align-items:center; justify-content:center; padding:2rem 1rem; }
        .card { width:100%; max-width:520px; background:rgba(26,26,26,.7); backdrop-filter:blur(20px);
                border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:2.5rem;
                box-shadow:0 8px 32px rgba(0,0,0,.4); text-align:center; }
        .icon { width:80px; height:80px; border-radius:20px; margin:0 auto 1.5rem;
                background:linear-gradient(135deg,#3a1818,#2a1010); display:flex;
                align-items:center; justify-content:center; font-size:2rem; color:#d04949;
                border:1px solid rgba(208,73,73,.3); }
        h1 { font-size:1.5rem; margin:0 0 .5rem; }
        p { color:#bdbdbd; line-height:1.55; }
        .actions { margin-top:1.5rem; display:flex; gap:.75rem; justify-content:center; flex-wrap:wrap; }
        .btn {
            /* WCAG 2.5.5 Target Size + Lei de Fitts: tap-target ≥44×44px */
            min-height:44px; padding:.6rem 1.4rem; border-radius:10px;
            font-weight:600; font-size:.95rem; border:1px solid rgba(255,255,255,.10);
            background:rgba(255,255,255,.06); color:#e0e0e0; text-decoration:none;
            display:inline-flex; align-items:center; justify-content:center; gap:.5rem;
            transition: background 180ms cubic-bezier(.2,.7,.3,1.0);
        }
        .btn:hover { background:rgba(255,255,255,.10); }
        @media (prefers-reduced-motion: reduce) { .btn { transition-duration: 1ms; } }
    </style>
</head>
<body>
    <main class="card" role="main">
        <div class="icon"><i class="fas fa-link-slash"></i></div>
        <h1>Link inválido ou expirado</h1>
        <p>O link que você acessou já foi usado, expirou ou nunca foi gerado pelo CaseHub. Os links são válidos por 24 horas.</p>
        <p style="margin-top:1rem;">Se você ainda quer ativar seu cadastro, faça uma nova solicitação. Caso já tenha confirmado, faça login normalmente.</p>
        <div class="actions">
            <a class="btn" href="{{ PREFIX }}/signup"><i class="fas fa-arrow-rotate-right"></i> Refazer cadastro</a>
            <a class="btn" href="{{ PREFIX }}/login"><i class="fas fa-right-to-bracket"></i> Fazer login</a>
        </div>
    </main>
</body>
</html>
