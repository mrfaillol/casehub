<!DOCTYPE html>
<html lang="{{ lang|default('pt-BR') }}" data-theme="{{ ui_theme|default(theme|default('light')) }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block robots %}<meta name="robots" content="noindex">{% endblock %}
    <title>{% block title %}CaseHub{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="/static/css/themes/_tokens.css">
    {% if ui_theme in ['glass', 'desktop', 'neuromorphic', 'white-label'] %}
    <link rel="stylesheet" href="/static/css/themes/{{ ui_theme }}.css">
    {% endif %}
    <link rel="stylesheet" href="/static/css/templates/base_minimal.css">
    {% block head_extra %}{% endblock %}
</head>
<body class="base-minimal minimal">
    <main class="base-minimal-main" role="main">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
