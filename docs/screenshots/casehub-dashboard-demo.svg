<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780" role="img" aria-labelledby="title desc">
  <title id="title">CaseHub dashboard demo</title>
  <desc id="desc">Sanitized demonstrative dashboard mockup with deadlines, agenda, documents, WhatsApp and Maestro panels.</desc>
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#6FBE54"/>
      <stop offset="0.55" stop-color="#008C4D"/>
      <stop offset="1" stop-color="#1E4890"/>
    </linearGradient>
    <filter id="raise" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-10" dy="-10" stdDeviation="10" flood-color="#ffffff" flood-opacity="0.95"/>
      <feDropShadow dx="12" dy="14" stdDeviation="14" flood-color="#9aa48b" flood-opacity="0.38"/>
    </filter>
    <filter id="press" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="5" dy="6" stdDeviation="8" flood-color="#9aa48b" flood-opacity="0.32"/>
      <feDropShadow dx="-5" dy="-5" stdDeviation="8" flood-color="#ffffff" flood-opacity="0.85"/>
    </filter>
  </defs>
  <rect width="1280" height="780" fill="#ECEEE6"/>
  <rect x="34" y="32" width="96" height="716" rx="26" fill="#F3F4EF" filter="url(#raise)"/>
  <circle cx="82" cy="78" r="24" fill="url(#brand)"/>
  <text x="64" y="138" font-family="Inter,Arial,sans-serif" font-size="15" fill="#001F3E" font-weight="700">CH</text>
  <g fill="#0B1426" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="650">
    <text x="58" y="208">Painel</text>
    <text x="58" y="266">Prazos</text>
    <text x="58" y="324">Agenda</text>
    <text x="58" y="382">Docs</text>
    <text x="58" y="440">WhatsApp</text>
    <text x="58" y="498">Maestro</text>
  </g>
  <rect x="160" y="44" width="1068" height="92" rx="24" fill="#F3F4EF" filter="url(#raise)"/>
  <text x="196" y="89" font-family="Inter,Arial,sans-serif" font-size="28" fill="#001F3E" font-weight="800">CaseHub</text>
  <text x="196" y="115" font-family="Inter,Arial,sans-serif" font-size="14" fill="#4F4B51">Framework juridico - ambiente demonstrativo sem dados reais</text>
  <rect x="858" y="70" width="324" height="40" rx="20" fill="#E6E9DF" filter="url(#press)"/>
  <text x="886" y="96" font-family="JetBrains Mono,monospace" font-size="13" fill="#4F4B51">buscar prazo, cliente ou processo</text>

  <g font-family="Inter,Arial,sans-serif">
    <rect x="160" y="166" width="242" height="126" rx="22" fill="#F3F4EF" filter="url(#raise)"/>
    <text x="188" y="206" font-size="14" fill="#4F4B51">Prazos hoje</text>
    <text x="188" y="250" font-size="46" fill="#001F3E" font-weight="800">12</text>
    <text x="270" y="250" font-size="14" fill="#C92D3B">3 urgentes</text>
    <rect x="430" y="166" width="242" height="126" rx="22" fill="#F3F4EF" filter="url(#raise)"/>
    <text x="458" y="206" font-size="14" fill="#4F4B51">Audiencias</text>
    <text x="458" y="250" font-size="46" fill="#001F3E" font-weight="800">8</text>
    <text x="540" y="250" font-size="14" fill="#008C4D">semana</text>
    <rect x="700" y="166" width="242" height="126" rx="22" fill="#F3F4EF" filter="url(#raise)"/>
    <text x="728" y="206" font-size="14" fill="#4F4B51">Processos ativos</text>
    <text x="728" y="250" font-size="46" fill="#001F3E" font-weight="800">256</text>
    <rect x="970" y="166" width="258" height="126" rx="22" fill="#F3F4EF" filter="url(#raise)"/>
    <text x="998" y="206" font-size="14" fill="#4F4B51">Documentos</text>
    <text x="998" y="250" font-size="46" fill="#001F3E" font-weight="800">48</text>
    <text x="1088" y="250" font-size="14" fill="#1E4890">novos</text>
  </g>

  <rect x="160" y="324" width="520" height="266" rx="26" fill="#F3F4EF" filter="url(#raise)"/>
  <text x="194" y="366" font-family="Inter,Arial,sans-serif" font-size="20" fill="#001F3E" font-weight="800">Controladoria</text>
  <g font-family="Inter,Arial,sans-serif" font-size="14">
    <rect x="194" y="394" width="452" height="42" rx="14" fill="#E6E9DF"/>
    <text x="216" y="421" fill="#0B1426">Contestacao - processo demo</text>
    <text x="560" y="421" fill="#C92D3B">hoje</text>
    <rect x="194" y="452" width="452" height="42" rx="14" fill="#E6E9DF"/>
    <text x="216" y="479" fill="#0B1426">Recurso - cliente exemplo</text>
    <text x="560" y="479" fill="#DB8A00">2 dias</text>
    <rect x="194" y="510" width="452" height="42" rx="14" fill="#E6E9DF"/>
    <text x="216" y="537" fill="#0B1426">Audiencia - vara exemplo</text>
    <text x="552" y="537" fill="#008C4D">7 dias</text>
  </g>

  <rect x="710" y="324" width="518" height="266" rx="26" fill="#F3F4EF" filter="url(#raise)"/>
  <text x="744" y="366" font-family="Inter,Arial,sans-serif" font-size="20" fill="#001F3E" font-weight="800">WhatsApp + Maestro</text>
  <rect x="744" y="394" width="210" height="156" rx="20" fill="#E6E9DF" filter="url(#press)"/>
  <text x="770" y="430" font-family="Inter,Arial,sans-serif" font-size="14" fill="#4F4B51">Conversas</text>
  <text x="770" y="472" font-family="Inter,Arial,sans-serif" font-size="34" fill="#008C4D" font-weight="800">31</text>
  <text x="770" y="506" font-family="Inter,Arial,sans-serif" font-size="13" fill="#4F4B51">7 com follow-up</text>
  <rect x="982" y="394" width="210" height="156" rx="20" fill="#0B1426"/>
  <text x="1010" y="430" font-family="JetBrains Mono,monospace" font-size="13" fill="#DBE64C">maestro</text>
  <text x="1010" y="466" font-family="Inter,Arial,sans-serif" font-size="14" fill="#FAFBF7">Resumo gerado</text>
  <text x="1010" y="492" font-family="Inter,Arial,sans-serif" font-size="13" fill="#B8C1CC">com fontes internas</text>
  <rect x="744" y="618" width="484" height="98" rx="24" fill="#001F3E"/>
  <text x="776" y="657" font-family="Inter,Arial,sans-serif" font-size="18" fill="#FAFBF7" font-weight="750">Google Workspace conectado</text>
  <text x="776" y="687" font-family="Inter,Arial,sans-serif" font-size="14" fill="#DDE6F0">Drive, Docs, Gmail e Calendar por tenant</text>
</svg>
