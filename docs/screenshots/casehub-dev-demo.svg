<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">CaseHub developer surface demo</title>
  <desc id="desc">Sanitized dark developer mockup with MCP, SDK, CLI and model provider router.</desc>
  <defs>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#6FBE54"/>
      <stop offset="1" stop-color="#1E4890"/>
    </linearGradient>
    <filter id="darkRaise" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-8" dy="-8" stdDeviation="10" flood-color="#ffffff" flood-opacity="0.06"/>
      <feDropShadow dx="12" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#0B1426"/>
  <rect x="42" y="42" width="1196" height="636" rx="28" fill="#101A2A" filter="url(#darkRaise)"/>
  <text x="82" y="104" font-family="Inter,Arial,sans-serif" font-size="34" fill="#FAFBF7" font-weight="800">CaseHub para devs</text>
  <text x="82" y="138" font-family="Inter,Arial,sans-serif" font-size="15" fill="#AAB7C8">Python-first, MCP read-only, SDK/CLI e providers de IA configuraveis.</text>
  <rect x="82" y="176" width="684" height="356" rx="22" fill="#07101D" stroke="#26364A"/>
  <rect x="82" y="176" width="684" height="42" rx="22" fill="#111F32"/>
  <circle cx="116" cy="198" r="7" fill="#F05252"/>
  <circle cx="140" cy="198" r="7" fill="#FBBF24"/>
  <circle cx="164" cy="198" r="7" fill="#22C55E"/>
  <text x="356" y="203" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="13" fill="#AAB7C8">casehub-mcp-server</text>
  <g font-family="JetBrains Mono,monospace" font-size="15">
    <text x="112" y="258" fill="#DBE64C">$ casehub-mcp</text>
    <text x="112" y="296" fill="#FAFBF7">transport: stdio</text>
    <text x="112" y="326" fill="#FAFBF7">policy: read-only allowlist</text>
    <text x="112" y="356" fill="#FAFBF7">tools: search_cases, get_case, list_clients</text>
    <text x="112" y="386" fill="#FAFBF7">       validate_documento, get_system_status</text>
    <text x="112" y="416" fill="#FAFBF7">       list_templates</text>
    <text x="112" y="456" fill="#6FBE54">status: connected</text>
  </g>
  <rect x="806" y="176" width="378" height="156" rx="22" fill="#142132" filter="url(#darkRaise)"/>
  <text x="838" y="222" font-family="Inter,Arial,sans-serif" font-size="20" fill="#FAFBF7" font-weight="800">Provider agnostic</text>
  <text x="838" y="258" font-family="Inter,Arial,sans-serif" font-size="14" fill="#AAB7C8">Hermes/local, NVIDIA, OpenRouter, Gemini, Claude, Codex ou GLM.</text>
  <rect x="838" y="286" width="248" height="10" rx="5" fill="#26364A"/>
  <rect x="838" y="286" width="166" height="10" rx="5" fill="url(#line)"/>
  <rect x="806" y="376" width="178" height="120" rx="20" fill="#142132" filter="url(#darkRaise)"/>
  <text x="834" y="421" font-family="JetBrains Mono,monospace" font-size="15" fill="#DBE64C">SDK</text>
  <text x="834" y="452" font-family="Inter,Arial,sans-serif" font-size="14" fill="#AAB7C8">Python v0.1.x</text>
  <rect x="1006" y="376" width="178" height="120" rx="20" fill="#142132" filter="url(#darkRaise)"/>
  <text x="1034" y="421" font-family="JetBrains Mono,monospace" font-size="15" fill="#DBE64C">CLI</text>
  <text x="1034" y="452" font-family="Inter,Arial,sans-serif" font-size="14" fill="#AAB7C8">Terminal ops</text>
  <rect x="82" y="574" width="1102" height="56" rx="18" fill="#142132"/>
  <text x="116" y="608" font-family="Inter,Arial,sans-serif" font-size="15" fill="#FAFBF7">Dados reais ficam no tenant. Repos publicos usam fixtures sinteticas e auditoria de segredo antes de publicar.</text>
</svg>
