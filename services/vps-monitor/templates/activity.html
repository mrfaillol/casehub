<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Monitor - Quem esta online</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👁️</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --bg-hover: #21262d;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-green: #3fb950;
            --accent-blue: #58a6ff;
            --accent-purple: #a371f7;
            --accent-orange: #d29922;
            --accent-red: #f85149;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
        }

        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
        }

        .live-badge {
            background: var(--accent-red);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .big-number {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1;
            color: var(--accent-green);
        }

        .source-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            margin: 0.25rem;
        }

        .source-wordpress { background: #21759b; color: white; }
        .source-casehub { background: var(--accent-purple); color: white; }
        .source-ilc-tools { background: var(--accent-orange); color: white; }
        .source-portal { background: var(--accent-blue); color: white; }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            padding: 1.5rem;
            max-width: 1800px;
            margin: 0 auto;
        }

        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        .panel-header {
            background: var(--bg-hover);
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 {
            font-size: 1rem;
            font-weight: 600;
            margin: 0;
        }

        .panel-body {
            padding: 0;
            max-height: 70vh;
            overflow-y: auto;
        }

        /* Users List */
        .user-item {
            display: flex;
            align-items: flex-start;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.15s;
        }

        .user-item:hover {
            background: var(--bg-hover);
        }

        .user-item:last-child {
            border-bottom: none;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1rem;
            margin-right: 1rem;
            flex-shrink: 0;
        }

        .avatar-admin { background: var(--accent-red); color: white; }
        .avatar-staff { background: var(--accent-purple); color: white; }
        .avatar-visitor { background: var(--bg-hover); color: var(--text-secondary); border: 2px solid var(--border-color); }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .user-name .badge {
            font-size: 0.65rem;
            padding: 0.15rem 0.5rem;
        }

        .user-page {
            font-size: 0.85rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .user-stats {
            text-align: right;
            flex-shrink: 0;
            margin-left: 1rem;
        }

        .user-time {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .user-counts {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* Activity Feed */
        .feed-item {
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        .feed-item:last-child {
            border-bottom: none;
        }

        .feed-time {
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-right: 0.5rem;
        }

        .feed-user {
            font-weight: 600;
            color: var(--accent-blue);
        }

        .feed-action {
            color: var(--text-secondary);
        }

        .feed-target {
            color: var(--text-primary);
        }

        .event-pageview { border-left: 3px solid var(--accent-blue); }
        .event-click { border-left: 3px solid var(--accent-green); }
        .event-form_submit { border-left: 3px solid var(--accent-purple); }
        .event-form_interaction { border-left: 3px solid var(--accent-orange); }
        .event-scroll { border-left: 3px solid var(--text-secondary); }

        /* User Timeline Modal */
        .timeline-modal {
            display: none;
            position: fixed;
            top: 0;
            right: 0;
            width: 450px;
            height: 100vh;
            background: var(--bg-card);
            border-left: 1px solid var(--border-color);
            z-index: 200;
            overflow-y: auto;
        }

        .timeline-modal.active {
            display: block;
        }

        .timeline-header {
            padding: 1rem 1.25rem;
            background: var(--bg-hover);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timeline-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .timeline-event {
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
        }

        .timeline-event-type {
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .timeline-event-detail {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            padding: 1rem;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-3">
                <h1><i class="fas fa-eye"></i> Activity Monitor</h1>
                <span class="live-badge"><i class="fas fa-circle"></i> LIVE</span>
            </div>
            <div class="d-flex align-items-center gap-3">
                <a href="/monitor/" class="btn btn-outline-light btn-sm">
                    <i class="fas fa-server"></i> VPS Monitor
                </a>
                <span id="last-update" class="text-muted small"></span>
            </div>
        </div>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="stat-item">
            <div class="big-number" id="total-online">0</div>
            <div class="stat-label">Online Agora</div>
        </div>
        <div class="stat-item" id="source-badges">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Users Panel -->
        <div class="panel">
            <div class="panel-header">
                <h2><i class="fas fa-users"></i> Usuarios Ativos</h2>
                <span class="text-muted small" id="users-count">0 usuarios</span>
            </div>
            <div class="panel-body" id="users-list">
                <div class="empty-state">
                    <i class="fas fa-user-clock"></i>
                    <p>Aguardando usuarios...</p>
                </div>
            </div>
        </div>

        <!-- Activity Feed Panel -->
        <div class="panel">
            <div class="panel-header">
                <h2><i class="fas fa-stream"></i> Feed em Tempo Real</h2>
                <span class="text-muted small" id="feed-count">0 eventos</span>
            </div>
            <div class="panel-body" id="activity-feed">
                <div class="empty-state">
                    <i class="fas fa-satellite-dish"></i>
                    <p>Aguardando atividade...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- User Timeline Modal -->
    <div class="timeline-modal" id="timeline-modal">
        <div class="timeline-header">
            <h3 id="timeline-user-name">Usuario</h3>
            <button class="timeline-close" onclick="closeTimeline()">&times;</button>
        </div>
        <div id="timeline-content">
            <!-- Populated by JS -->
        </div>
    </div>

    <script>
        // State
        let eventSource = null;
        let users = [];
        let recentEvents = [];

        // Initialize SSE connection
        function initSSE() {
            if (eventSource) {
                eventSource.close();
            }

            eventSource = new EventSource('/monitor/api/activity/stream');

            eventSource.addEventListener('activity_update', (event) => {
                const data = JSON.parse(event.data);
                updateDashboard(data);
            });

            eventSource.addEventListener('error', (event) => {
                console.error('SSE Error:', event);
                document.getElementById('total-online').textContent = '?';
                // Reconnect after 5 seconds
                setTimeout(initSSE, 5000);
            });
        }

        // Update dashboard with new data
        function updateDashboard(data) {
            // Update total online
            document.getElementById('total-online').textContent = data.active_count || 0;
            document.getElementById('users-count').textContent = `${data.active_count || 0} usuarios`;
            document.getElementById('last-update').textContent = `Atualizado: ${new Date().toLocaleTimeString()}`;

            // Update source badges
            const sourceBadges = document.getElementById('source-badges');
            const sources = data.by_source || {};
            sourceBadges.innerHTML = Object.entries(sources)
                .filter(([_, count]) => count > 0)
                .map(([source, count]) => `<span class="source-badge source-${source}">${source}: ${count}</span>`)
                .join('');

            // Update users list
            users = data.users || [];
            renderUsers();

            // Update feed
            if (data.recent_events && data.recent_events.length > 0) {
                recentEvents = data.recent_events;
                renderFeed();
            }
        }

        // Render users list
        function renderUsers() {
            const container = document.getElementById('users-list');

            if (users.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-user-clock"></i>
                        <p>Nenhum usuario online</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = users.map(user => {
                const avatarClass = user.is_admin ? 'avatar-admin' :
                                   (user.user_type === 'staff' || user.user_type === 'attorney') ? 'avatar-staff' :
                                   'avatar-visitor';

                const initial = user.user_name ? user.user_name.charAt(0).toUpperCase() :
                               user.user_email ? user.user_email.charAt(0).toUpperCase() : '?';

                const adminBadge = user.is_admin ? '<span class="badge bg-danger">ADMIN</span>' : '';
                const typeBadge = !user.is_admin && user.user_type !== 'visitor' ?
                                 `<span class="badge bg-secondary">${user.user_type}</span>` : '';

                return `
                    <div class="user-item" onclick="showTimeline('${user.session_id}', '${escapeHtml(user.user_name || 'Visitante')}')">
                        <div class="user-avatar ${avatarClass}">${initial}</div>
                        <div class="user-info">
                            <div class="user-name">
                                ${escapeHtml(user.user_name || 'Visitante')}
                                ${adminBadge}
                                ${typeBadge}
                            </div>
                            <div class="user-page" title="${escapeHtml(user.current_page)}">
                                <i class="fas fa-globe"></i> ${escapeHtml(user.current_page_title || user.current_page)}
                            </div>
                            <div class="user-meta">
                                <span class="source-badge source-${user.source}" style="padding: 0.1rem 0.4rem; font-size: 0.7rem;">${user.source}</span>
                            </div>
                        </div>
                        <div class="user-stats">
                            <div class="user-time">${user.last_seen}</div>
                            <div class="user-counts">
                                <i class="fas fa-eye"></i> ${user.page_views}
                                <i class="fas fa-mouse-pointer ms-2"></i> ${user.interactions}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Render activity feed
        function renderFeed() {
            const container = document.getElementById('activity-feed');
            document.getElementById('feed-count').textContent = `${recentEvents.length} eventos`;

            if (recentEvents.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-satellite-dish"></i>
                        <p>Aguardando atividade...</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = recentEvents.map(event => {
                const time = event.timestamp ? new Date(event.timestamp).toLocaleTimeString() : '';
                const action = formatAction(event);

                return `
                    <div class="feed-item event-${event.event_type}">
                        <span class="feed-time">${time}</span>
                        <span class="feed-user">${escapeHtml(event.user_name || 'Visitante')}</span>
                        <span class="feed-action">${action}</span>
                    </div>
                `;
            }).join('');
        }

        // Format action text
        function formatAction(event) {
            switch (event.event_type) {
                case 'pageview':
                    return `abriu <span class="feed-target">${escapeHtml(event.page_title || event.page_url)}</span>`;
                case 'click':
                    return `clicou em <span class="feed-target">${escapeHtml(event.element_text || 'botao')}</span>`;
                case 'form_submit':
                    return `enviou <span class="feed-target">formulario</span>`;
                case 'form_interaction':
                    return `interagiu com <span class="feed-target">formulario</span>`;
                case 'scroll':
                    return `scrollou a pagina`;
                case 'navigation':
                    return `navegou para <span class="feed-target">${escapeHtml(event.page_url)}</span>`;
                default:
                    return event.event_type;
            }
        }

        // Show user timeline
        async function showTimeline(sessionId, userName) {
            document.getElementById('timeline-modal').classList.add('active');
            document.getElementById('timeline-user-name').textContent = userName;
            document.getElementById('timeline-content').innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Carregando...</p></div>';

            try {
                const response = await fetch(`/monitor/api/activity/user/${sessionId}`);
                const data = await response.json();

                if (data.timeline && data.timeline.length > 0) {
                    document.getElementById('timeline-content').innerHTML = data.timeline.map(event => `
                        <div class="timeline-event event-${event.event_type}">
                            <div class="timeline-event-type">${event.event_type}</div>
                            <div class="timeline-event-detail">
                                ${escapeHtml(event.page_title || event.page_url)}
                                ${event.element_text ? `<br><small>Elemento: ${escapeHtml(event.element_text)}</small>` : ''}
                            </div>
                            <div class="timeline-event-detail">
                                <small>${event.timestamp ? new Date(event.timestamp).toLocaleString() : ''}</small>
                            </div>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('timeline-content').innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>Sem eventos registrados</p></div>';
                }
            } catch (e) {
                document.getElementById('timeline-content').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Erro ao carregar</p></div>';
            }
        }

        function closeTimeline() {
            document.getElementById('timeline-modal').classList.remove('active');
        }

        // Escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal on click outside
        document.addEventListener('click', (e) => {
            const modal = document.getElementById('timeline-modal');
            if (modal.classList.contains('active') && !modal.contains(e.target) && !e.target.closest('.user-item')) {
                closeTimeline();
            }
        });

        // Close modal on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeTimeline();
        });

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initSSE);
    </script>
</body>
</html>
