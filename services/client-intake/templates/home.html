<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
    <title>Client Portal - Immigration Law Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2c5aa0;
            --secondary: #1a3d6e;
        }
        body {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .logo {
            font-size: 3rem;
            color: var(--primary);
        }
        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
        }
        .btn-primary:hover {
            background: var(--secondary);
            border-color: var(--secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card">
                    <div class="card-body p-5 text-center">
                        <div class="logo mb-3">
                            <i class="fas fa-balance-scale"></i>
                        </div>
                        <h2 class="mb-2">Immigration Law Center</h2>
                        <p class="text-muted mb-4">Client Intake Portal</p>

                        <div class="alert alert-info">
                            <i class="fas fa-info-circle me-2"></i>
                            Please use the link provided by your attorney to access your forms.
                        </div>

                        <p class="text-muted small mt-4">
                            If you have questions, contact us at:<br>
                            <a href="mailto:info@casehub.app">info@casehub.app</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
