<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Leads - {{ org_name or "CaseHub" }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0b141a;
            --bg-secondary: #111b21;
            --bg-tertiary: #202c33;
            --border: #2a3942;
            --text-primary: #e9edef;
            --text-secondary: #8696a0;
            --green: #00a884;
            --green-dark: #025144;
            --red: #f15c6d;
            --orange: #ffa726;
            --blue: #53bdeb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 i {
            color: var(--green);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--green);
            color: white;
        }

        .btn-primary:hover {
            background: #009974;
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .stat-card.green .stat-value { color: var(--green); }
        .stat-card.orange .stat-value { color: var(--orange); }
        .stat-card.red .stat-value { color: var(--red); }
        .stat-card.blue .stat-value { color: var(--blue); }

        .section {
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .section-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: var(--green);
        }

        .section-body {
            padding: 0;
        }

        .lead-list {
            list-style: none;
        }

        .lead-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }

        .lead-item:hover {
            background: var(--bg-tertiary);
        }

        .lead-item:last-child {
            border-bottom: none;
        }

        .lead-status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .lead-status-dot.urgent { background: var(--red); }
        .lead-status-dot.needs-attention { background: var(--orange); }
        .lead-status-dot.ok { background: var(--green); }

        .lead-info {
            flex: 1;
            min-width: 0;
        }

        .lead-phone {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .lead-name {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .lead-interest {
            color: var(--blue);
            font-size: 13px;
            padding: 2px 8px;
            background: rgba(83, 189, 235, 0.1);
            border-radius: 12px;
            margin-left: 8px;
        }

        .lead-time {
            color: var(--text-secondary);
            font-size: 13px;
            margin-right: 16px;
            min-width: 80px;
            text-align: right;
        }

        .lead-message {
            color: var(--text-secondary);
            font-size: 13px;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .lead-actions {
            display: flex;
            gap: 8px;
            margin-left: 16px;
        }

        .lead-action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .lead-action-btn:hover {
            background: var(--green-dark);
        }

        .empty-state {
            padding: 40px;
            text-align: center;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            color: var(--green);
        }

        .monitor-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .monitor-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .last-check {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .activity-log {
            max-height: 400px;
            overflow-y: auto;
        }

        .activity-item {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-time {
            color: var(--green);
            font-weight: 500;
            margin-right: 12px;
        }

        .activity-phone {
            color: var(--blue);
            margin-right: 8px;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .loading i {
            margin-right: 12px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .refresh-indicator {
            font-size: 12px;
            color: var(--text-secondary);
        }

        a {
            color: var(--blue);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-chart-line"></i> Monitor de Leads</h1>
            <div class="header-actions">
                <div class="monitor-status">
                    <div class="monitor-status-dot"></div>
                    <span>Monitorando</span>
                    <span class="last-check" id="lastCheck">-</span>
                </div>
                <button class="btn btn-secondary" onclick="loadAllData()">
                    <i class="fas fa-sync-alt"></i> Atualizar
                </button>
                <a href="/ui" class="btn btn-primary">
                    <i class="fab fa-whatsapp"></i> Abrir WhatsApp UI
                </a>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card green">
                <div class="stat-value" id="statResponded">-</div>
                <div class="stat-label">Respondidas (24h)</div>
            </div>
            <div class="stat-card orange">
                <div class="stat-value" id="statAwaiting">-</div>
                <div class="stat-label">Aguardando Resposta</div>
            </div>
            <div class="stat-card red">
                <div class="stat-value" id="statUrgent">-</div>
                <div class="stat-label">Urgentes</div>
            </div>
            <div class="stat-card blue">
                <div class="stat-value" id="statNeedsHuman">-</div>
                <div class="stat-label">Precisam Humano</div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-title">
                    <i class="fas fa-exclamation-triangle"></i>
                    Leads Precisando de Atencao
                </div>
                <span class="refresh-indicator" id="leadsRefreshTime">-</span>
            </div>
            <div class="section-body">
                <ul class="lead-list" id="leadsList">
                    <div class="loading">
                        <i class="fas fa-spinner"></i> Carregando...
                    </div>
                </ul>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-title">
                    <i class="fas fa-history"></i>
                    Status do Monitor
                </div>
            </div>
            <div class="section-body">
                <div class="activity-log" id="monitorStatus">
                    <div class="activity-item">
                        <span class="activity-time">-</span>
                        Carregando status...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // MONITOR DASHBOARD
        // ============================================

        async function loadAllData() {
            await Promise.all([
                loadMonitorStatus(),
                loadLeadsNeedingAttention()
            ]);
        }

        async function loadMonitorStatus() {
            try {
                const response = await fetch('/api/monitor/status');
                const data = await response.json();

                // Update stats
                if (data.dbStats) {
                    document.getElementById('statResponded').textContent = data.dbStats.responded || 0;
                    document.getElementById('statAwaiting').textContent = data.dbStats.awaiting || 0;
                    document.getElementById('statUrgent').textContent = data.dbStats.urgent || 0;
                    document.getElementById('statNeedsHuman').textContent = data.dbStats.needsHuman || 0;
                }

                // Update last check
                if (data.lastCheck) {
                    const lastCheck = new Date(data.lastCheck);
                    document.getElementById('lastCheck').textContent =
                        `Ultima verificacao: ${lastCheck.toLocaleTimeString('pt-BR')}`;
                }

                // Update monitor status
                const statusContainer = document.getElementById('monitorStatus');
                statusContainer.innerHTML = `
                    <div class="activity-item">
                        <span class="activity-time">Status</span>
                        ${data.isRunning ? 'Verificacao em andamento...' : 'Aguardando proxima verificacao'}
                    </div>
                    <div class="activity-item">
                        <span class="activity-time">Config</span>
                        Verifica a cada ${data.config?.checkIntervalMinutes || 5} minutos |
                        Alerta apos ${data.config?.alertThresholdMinutes || 30} min sem resposta
                    </div>
                    <div class="activity-item">
                        <span class="activity-time">Notif.</span>
                        Google Chat: ${data.config?.googleChatConfigured ? 'Configurado' : 'Nao configurado'} |
                        Email: ${data.config?.emailConfigured ? 'Configurado' : 'Nao configurado'}
                    </div>
                    <div class="activity-item">
                        <span class="activity-time">Leads</span>
                        ${data.leadsNeedingAttention || 0} leads precisando de atencao
                    </div>
                `;

            } catch (e) {
                console.error('[Monitor] Error loading status:', e.message);
            }
        }

        async function loadLeadsNeedingAttention() {
            const container = document.getElementById('leadsList');

            try {
                const response = await fetch('/api/monitor/leads-needing-attention');
                const data = await response.json();

                document.getElementById('leadsRefreshTime').textContent =
                    `Atualizado: ${new Date().toLocaleTimeString('pt-BR')}`;

                if (!data.leads || data.leads.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-check-circle"></i>
                            <p>Todas as leads estao respondidas!</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = data.leads.map(lead => {
                    const statusClass = lead.is_urgent ? 'urgent' :
                                       (lead.minutes_since_last_message > 30 || lead.needs_human_review) ? 'needs-attention' : 'ok';

                    const timeText = lead.minutes_since_last_message ?
                        (lead.minutes_since_last_message < 60 ? `${lead.minutes_since_last_message} min` :
                         lead.minutes_since_last_message < 1440 ? `${Math.floor(lead.minutes_since_last_message / 60)}h` :
                         `${Math.floor(lead.minutes_since_last_message / 1440)}d`) : '-';

                    return `
                        <li class="lead-item" onclick="openChat('${lead.phone}')">
                            <div class="lead-status-dot ${statusClass}"></div>
                            <div class="lead-info">
                                <div class="lead-phone">
                                    ${lead.phone}
                                    ${lead.visa_interest ? `<span class="lead-interest">${escapeHtml(lead.visa_interest)}</span>` : ''}
                                </div>
                                <div class="lead-name">
                                    ${escapeHtml(lead.whatsapp_name || lead.client_name || 'Sem nome')}
                                    ${lead.is_urgent ? '<span style="color: var(--red); margin-left: 8px;">URGENTE</span>' : ''}
                                    ${lead.needs_human_review ? '<span style="color: var(--orange); margin-left: 8px;">Precisa humano</span>' : ''}
                                </div>
                            </div>
                            <div class="lead-time">${timeText}</div>
                            <div class="lead-message">"${escapeHtml((lead.last_message || '').substring(0, 50))}..."</div>
                            <div class="lead-actions">
                                <button class="lead-action-btn" onclick="event.stopPropagation(); openChat('${lead.phone}')">
                                    <i class="fas fa-comment"></i> Abrir
                                </button>
                            </div>
                        </li>
                    `;
                }).join('');

            } catch (e) {
                console.error('[Monitor] Error loading leads:', e.message);
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Erro ao carregar leads</p>
                    </div>
                `;
            }
        }

        function openChat(phone) {
            // Get token from URL if present
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token') || '';
            window.open(`/ui?token=${token}#${phone}`, '_blank');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function forceCheck() {
            try {
                const response = await fetch('/api/monitor/check', { method: 'POST' });
                const data = await response.json();
                alert(`Verificacao forcada: ${data.leadsChecked} leads verificadas`);
                loadAllData();
            } catch (e) {
                alert('Erro ao forcar verificacao: ' + e.message);
            }
        }

        // Auto-refresh every 30 seconds
        setInterval(loadAllData, 30000);

        // Initial load
        loadAllData();
    </script>
</body>
</html>
