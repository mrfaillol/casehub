sentinela:
  port: 8015
  db_path: /var/www/legacy.example/sentinela/sentinela.db
  log_path: /var/www/legacy.example/sentinela/logs/
intervals:
  health_snapshot: 30
  canary_check: 300
  trend_analysis: 600
  daily_digest:
  - 08:00
  - '18:00'
  cleanup_retention_days: 30
services:
  whatsapp-bot:
    port: 3001
    health_endpoint: /api/status
    criticality: 1.5
    dependencies:
    - mariadb
    - nginx
    canaries:
    - whatsapp_connected
    memory_limit_mb: 600
  casehub:
    port: 8001
    health_endpoint: /api/health
    criticality: 1.3
    dependencies:
    - mariadb
    - nginx
    canaries:
    - casehub_login_renders
    - casehub_api_responds
    memory_limit_mb: 3500
  ilc-tools:
    port: 8000
    health_endpoint: /
    criticality: 1.0
    dependencies:
    - postgresql
    - nginx
    canaries:
    - ilctools_loads
    memory_limit_mb: 300
  n8n:
    port: 5678
    health_endpoint: /healthz
    criticality: 0.8
    dependencies:
    - nginx
    canaries:
    - n8n_webhooks_active
    memory_limit_mb: 1000
  vps-monitor:
    port: 8010
    health_endpoint: /api/health
    criticality: 0.7
    dependencies:
    - nginx
    canaries:
    - vps_monitor_api
    memory_limit_mb: 200
alerts:
  whatsapp_admin_phone: 'REDACTED-PHONE'
  whatsapp_api: http://127.0.0.1:3001/api/send
  email_from: info@legacy.example
  dedup_window_minutes: 30
smtp_app_password: ""
healing:
  circuit_breaker_max_attempts: 3
  circuit_breaker_window_hours: 1
  auto_heal_enabled: true
  auto_restart_allowed:
  - vps-monitor
  - n8n
  - casehub
  - ilc-tools
  - whatsapp-bot
  escalate_only:
  - mariadb
  - postgresql
  - nginx
