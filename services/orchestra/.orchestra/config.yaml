ai_agents:
  claude:
    can_interrupt:
    - gemini_contracts_only
    capabilities:
    - code_generation
    - database_design
    - api_development
    - system_architecture
    constraints:
    - cannot_approve_own_merges
    model: claude-opus-4
    role: backend_developer
  gemini:
    can_interrupt:
    - claude_api_contracts_only
    capabilities:
    - ui_design
    - javascript_development
    - css_styling
    - react_components
    constraints:
    - must_monitor_backend_constantly
    - cannot_modify_backend_logic
    model: gemini-2.0-pro
    role: frontend_developer
  perplexity:
    can_interrupt:
    - claude
    - gemini
    capabilities:
    - web_research
    - code_review
    - test_automation
    - benchmark_analysis
    has_veto_power: true
    model: perplexity-pro
    role: qa_tester_researcher
api_contracts:
  notify_frontend_on_change: true
  payload_validation: true
  schema_validation: true
  validation_level: strict
governance_rules:
  interruption:
    auto_snapshot_before_fix: true
    max_interruptions_per_hour: 10
    requires_justification: true
    timeout_for_response: 30 minutes
  snapshots:
    auto_create_before_fix: true
    max_snapshots: 100
    preserve_critical_snapshots: 30 days
    retention_policy: FIFO
  voting:
    minimum_votes_required: 2
    tiebreaker: claude_decides
    voting_timeout: 15 minutes
project: ILC-CaseHub
relationships:
  claude_to_gemini:
    allowed: true
    type: all
    updated_at: '2026-01-13T11:38:38.691099'
services:
  casehub:
    port: 8001
    url: https://legacy.example/casehub
  orchestra:
    port: 8002
    url: https://legacy.example/orchestra
  redis:
    host: localhost
    port: 6379
version: '1.0'
