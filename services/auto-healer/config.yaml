# Auto-Healer ILC - Configuracao
# v1.0 - 15/02/2026

principles:
  backup_before_action: true
  max_backup_age_days: 7
  verify_after_action: true
  escalate_on_failure: true

rate_limits:
  max_fix_attempts_per_hour: 3
  min_restart_interval_sec: 600  # 10 min
  escalation_cooldown_sec: 7200  # 2h

notifications:
  email_to: center@immigrant.law
  email_from: ILC System Monitor <info@immigrant.law>
  whatsapp_admin: '5532991513405'
  alert_script: /var/www/immigrant.law/send_alert_email.py

paths:
  state_file: /var/www/immigrant.law/auto-healer/state.json
  audit_log: /var/www/immigrant.law/auto-healer/audit.log
  backup_dir: /var/www/immigrant.law/auto-healer/backups
  report_dir: /var/www/immigrant.law/auto-healer/reports
  pm2_logs: /root/.pm2/logs
  pg_log: /var/log/postgresql

services:
  whatsapp-bot:
    port: 3001
    criticality: critical
    health_endpoint: http://localhost:3001/api/status
    error_log: /root/.pm2/logs/whatsapp-bot-error.log
    out_log: /root/.pm2/logs/whatsapp-bot-out.log
    code_path: /var/www/immigrant.law/whatsapp-bot
    backup_path: /var/www/immigrant.law/whatsapp-bot/backups
    depends_on: [mariadb, chrome]
    impacts: [casehub-chat, calendly-webhooks, facebook-capi, leads, clients]
    forbidden_actions: [pm2_delete]
    restart_wait_sec: 15

  casehub:
    port: 8001
    criticality: critical
    health_endpoint: http://localhost:8001/api/health
    error_log: /root/.pm2/logs/casehub-error.log
    out_log: /root/.pm2/logs/casehub-out.log
    code_path: /var/www/immigrant.law/casehub
    depends_on: [postgresql, redis]
    impacts: [admin-dashboard, whatsapp-chat-panel, email-processing]
    restart_wait_sec: 45  # BERT model load

  ilc-tools:
    port: 8000
    criticality: medium
    health_endpoint: http://localhost:8000/
    error_log: /root/.pm2/logs/ilc-tools-error.log
    depends_on: [postgresql]
    impacts: []
    restart_wait_sec: 10

  vps-monitor:
    port: 8010
    criticality: low
    health_endpoint: http://localhost:8010/
    error_log: /root/.pm2/logs/vps-monitor-error.log
    depends_on: [postgresql]
    impacts: []
    restart_wait_sec: 10

  client-intake:
    port: 8003
    criticality: low
    health_endpoint: http://localhost:8003/
    error_log: /root/.pm2/logs/client-intake-error.log
    depends_on: []
    impacts: [public-intake-form]
    restart_wait_sec: 10

  n8n:
    port: 5678
    criticality: medium
    health_endpoint: http://localhost:5678/healthz
    error_log: /root/.pm2/logs/n8n-error.log
    depends_on: []
    impacts: [automation-workflows]
    restart_wait_sec: 15
